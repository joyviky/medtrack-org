<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View your complete appointment history on MedTrack.">
    <title>MedTrack – Appointment History</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🏥 Med<span>Track</span></h1>
                <div class="user-info">
                    <div class="avatar" id="sidebar-avatar">P</div>
                    <div class="user-details">
                        <h3 id="sidebar-name">Patient</h3>
                        <p id="sidebar-role">patient</p>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">Main</div>
                <a href="/pages/patientDashboard.html">📊 Dashboard</a>
                <a href="/pages/searchDoctor.html">🔍 Find Doctor</a>
                <div class="nav-section">My Health</div>
                <a href="/pages/patientAppointments.html">📋 My Appointments</a>
                <a href="/pages/medicalRecords.html">📁 Medical Records</a>
                <a href="/pages/appointmentHistory.html" class="active">🕐 History</a>
                <div class="nav-section">Account</div>
                <a href="/pages/patientProfile.html">👤 My Profile</a>
                <a href="/pages/notifications.html">🔔 Notifications</a>
            </nav>
            <div class="sidebar-bottom"><a href="#" onclick="logout()">🚪 Logout</a></div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h2>Appointment History 🕐</h2>
                    <p>Your complete appointment timeline</p>
                </div>
            </div>

            <div id="history-content">
                <div class="flex-center" style="padding: 60px;">
                    <div class="spinner spinner-lg spinner-primary"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (!requireAuth()) return;
            setupSidebar();
            loadHistory();
        });

        async function loadHistory() {
            showLoading();
            const res = await apiRequest("/appointments/patient");
            hideLoading();

            const container = document.getElementById("history-content");
            const appts = res?.data?.appointments || [];

            if (appts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📅</div>
                        <h3>No appointment history</h3>
                        <p>Book your first appointment to get started.</p>
                    </div>
                `;
                return;
            }

            // Group by month
            const grouped = {};
            appts.forEach(appt => {
                const month = appt.date ? appt.date.substring(0, 7) : 'Unknown';
                if (!grouped[month]) grouped[month] = [];
                grouped[month].push(appt);
            });

            let html = '';
            for (const [month, list] of Object.entries(grouped)) {
                const monthLabel = month !== 'Unknown' 
                    ? new Date(month + '-01').toLocaleDateString('en-US', { year: 'numeric', month: 'long' })
                    : 'Unknown';

                html += `<h3 style="margin: 24px 0 12px; color: var(--text-secondary);">${monthLabel}</h3>`;

                html += `<div class="card mb-2"><div class="table-container"><table>
                    <thead><tr>
                        <th>Date</th><th>Time</th><th>Doctor</th><th>Status</th><th>Actions</th>
                    </tr></thead><tbody>`;

                list.forEach(appt => {
                    html += `<tr>
                        <td>${appt.date}</td>
                        <td>${appt.timeSlot}</td>
                        <td>Dr. ${appt.doctorName || 'N/A'}</td>
                        <td><span class="badge badge-${appt.status}">${appt.status.replace('_', ' ')}</span></td>
                        <td><button class="btn btn-outline btn-sm" onclick="window.location.href='/pages/appointmentDetails.html?id=${appt._id}'">View</button></td>
                    </tr>`;
                });

                html += `</tbody></table></div></div>`;
            }

            container.innerHTML = html;
        }
    </script>
</body>
</html>
