<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View prescriptions on MedTrack.">
    <title>MedTrack – Prescriptions</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🏥 Med<span>Track</span></h1>
                <div class="user-info">
                    <div class="avatar" id="sidebar-avatar">U</div>
                    <div class="user-details">
                        <h3 id="sidebar-name">User</h3>
                        <p id="sidebar-role">user</p>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">Navigation</div>
                <a href="#" onclick="goBack()">← Go Back</a>
                <a href="/pages/medicalRecords.html">📁 Medical Records</a>
                <a href="/pages/prescriptionView.html" class="active">💊 Prescriptions</a>
            </nav>
            <div class="sidebar-bottom"><a href="#" onclick="logout()">🚪 Logout</a></div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h2>Prescriptions 💊</h2>
                    <p>View all your prescriptions</p>
                </div>
            </div>

            <div id="prescriptions-list">
                <div class="flex-center" style="padding: 60px;">
                    <div class="spinner spinner-lg spinner-primary"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (!requireAuth()) return;
            setupSidebar();
            loadPrescriptions();
        });

        async function loadPrescriptions() {
            showLoading();

            const user = getUser();
            let res;
            if (user.role === "patient") {
                res = await apiRequest("/appointments/patient?status=prescription_uploaded");
            } else {
                res = await apiRequest("/appointments/doctor?status=prescription_uploaded");
            }

            hideLoading();

            const container = document.getElementById("prescriptions-list");
            const appts = res?.data?.appointments || [];

            if (appts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">💊</div>
                        <h3>No prescriptions yet</h3>
                        <p>Prescriptions will appear here after your doctor uploads them.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = appts.map(appt => `
                <div class="prescription-card mb-3">
                    <div class="rx-header">
                        <h2>🏥 MedTrack Prescription</h2>
                        <p style="color: var(--text-secondary); margin-top: 4px;">Date: ${appt.date}</p>
                    </div>
                    <div class="rx-body">
                        <div class="rx-item">
                            <span class="rx-label">Doctor</span>
                            <span>Dr. ${appt.doctorName || appt.patientName || 'N/A'}</span>
                        </div>
                        <div class="rx-item">
                            <span class="rx-label">Time Slot</span>
                            <span>${appt.timeSlot}</span>
                        </div>
                        <div class="rx-item">
                            <span class="rx-label">Reason</span>
                            <span>${appt.reason || 'Not specified'}</span>
                        </div>
                        ${appt.prescription ? `
                            <div class="rx-item">
                                <span class="rx-label">Prescription</span>
                                <span>${appt.prescription}</span>
                            </div>
                        ` : ''}
                        ${appt.notes ? `
                            <div class="rx-item">
                                <span class="rx-label">Notes</span>
                                <span>${appt.notes}</span>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join("");
        }

        function goBack() { window.history.back(); }
    </script>
</body>
</html>
