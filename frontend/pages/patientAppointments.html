<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View and manage your appointments on MedTrack.">
    <title>MedTrack – My Appointments</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🏥 Med<span>Track</span></h1>
                <div class="user-info">
                    <div class="avatar" id="sidebar-avatar">P</div>
                    <div class="user-details">
                        <h3 id="sidebar-name">Patient</h3>
                        <p id="sidebar-role">patient</p>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">Main</div>
                <a href="/pages/patientDashboard.html">📊 Dashboard</a>
                <a href="/pages/searchDoctor.html">🔍 Find Doctor</a>
                <a href="/pages/bookAppointment.html">📅 Book Appointment</a>
                <div class="nav-section">My Health</div>
                <a href="/pages/patientAppointments.html" class="active">📋 My Appointments</a>
                <a href="/pages/medicalRecords.html">📁 Medical Records</a>
                <a href="/pages/appointmentHistory.html">🕐 History</a>
                <div class="nav-section">Account</div>
                <a href="/pages/patientProfile.html">👤 My Profile</a>
                <a href="/pages/notifications.html">🔔 Notifications</a>
            </nav>
            <div class="sidebar-bottom"><a href="#" onclick="logout()">🚪 Logout</a></div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h2>My Appointments 📋</h2>
                    <p>View and manage all your appointments</p>
                </div>
                <a href="/pages/searchDoctor.html" class="btn btn-primary">+ New Appointment</a>
            </div>

            <div class="search-bar">
                <select id="status-filter" onchange="filterAppointments()">
                    <option value="">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="approved">Approved</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                    <option value="prescription_uploaded">Prescription Uploaded</option>
                </select>
            </div>

            <div id="appointments-list">
                <div class="flex-center" style="padding: 60px;">
                    <div class="spinner spinner-lg spinner-primary"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Review Modal -->
    <div class="modal-overlay" id="review-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>⭐ Rate Your Doctor</h3>
                <button class="modal-close" onclick="closeReviewModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="text-center mb-3">
                    <div class="stars" style="justify-content: center; font-size: 2rem;">
                        <span class="star review-star" onclick="setRating(1)">★</span>
                        <span class="star review-star" onclick="setRating(2)">★</span>
                        <span class="star review-star" onclick="setRating(3)">★</span>
                        <span class="star review-star" onclick="setRating(4)">★</span>
                        <span class="star review-star" onclick="setRating(5)">★</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Your Review (optional)</label>
                    <textarea id="review-comment" placeholder="Share your experience..." rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeReviewModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitReview()">Submit Review</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/appointment.js"></script>
</body>
</html>
